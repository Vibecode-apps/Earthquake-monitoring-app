<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Earthquake Power Monitor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Activity = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>
            </svg>
        );
        
        const Zap = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
            </svg>
        );
        
        const MapPin = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
        );
        
        const AlertTriangle = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
                <path d="M12 9v4"/><path d="M12 17h.01"/>
            </svg>
        );
        
        const Calendar = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M8 2v4"/><path d="M16 2v4"/>
                <rect width="18" height="18" x="3" y="4" rx="2"/>
                <path d="M3 10h18"/>
            </svg>
        );
        
        const TrendingUp = (props) => (
            <svg {...props} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                <polyline points="16 7 22 7 22 13"/>
            </svg>
        );

        const App = () => {
          const [earthquakes, setEarthquakes] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [filter, setFilter] = useState('all');
          const [timeRange, setTimeRange] = useState('day');

          useEffect(() => {
            fetchData();
          }, [timeRange]);

          const fetchData = async () => {
            try {
              setLoading(true);
              setError(null);
              
              const urls = {
                hour: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson',
                day: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson',
                week: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_week.geojson',
                month: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_month.geojson'
              };
              
              const url = urls[timeRange] || urls.day;
              let data;
              
              try {
                const res = await fetch(url);
                data = await res.json();
              } catch {
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxy);
                data = await res.json();
              }
              
              const quakes = data.features
                .filter(q => q.properties.mag != null)
                .map(q => {
                  const mag = q.properties.mag;
                  const energy = Math.pow(10, 4.8 + 1.5 * mag);
                  return {
                    id: q.id,
                    place: q.properties.place || 'Unknown',
                    magnitude: mag,
                    time: new Date(q.properties.time),
                    energy: energy,
                    power: energy / 60,
                    depth: q.geometry.coordinates[2] || 0
                  };
                })
                .sort((a, b) => b.time - a.time);
              
              setEarthquakes(quakes);
            } catch (err) {
              setError('Failed to load earthquake data');
            } finally {
              setLoading(false);
            }
          };

          const formatPower = (watts) => {
            if (watts >= 1e15) return `${(watts / 1e15).toFixed(2)} PW`;
            if (watts >= 1e12) return `${(watts / 1e12).toFixed(2)} TW`;
            if (watts >= 1e9) return `${(watts / 1e9).toFixed(2)} GW`;
            if (watts >= 1e6) return `${(watts / 1e6).toFixed(2)} MW`;
            if (watts >= 1e3) return `${(watts / 1e3).toFixed(2)} kW`;
            return `${watts.toFixed(2)} W`;
          };

          const formatEnergy = (j) => {
            if (j >= 1e15) return `${(j / 1e15).toFixed(2)} PJ`;
            if (j >= 1e12) return `${(j / 1e12).toFixed(2)} TJ`;
            if (j >= 1e9) return `${(j / 1e9).toFixed(2)} GJ`;
            if (j >= 1e6) return `${(j / 1e6).toFixed(2)} MJ`;
            return `${(j / 1e3).toFixed(2)} kJ`;
          };

          const getColor = (mag) => {
            if (mag >= 7) return 'bg-red-500';
            if (mag >= 6) return 'bg-orange-500';
            if (mag >= 5) return 'bg-yellow-500';
            if (mag >= 4) return 'bg-blue-500';
            return 'bg-gray-500';
          };

          const filtered = earthquakes.filter(q => {
            if (filter === 'major') return q.magnitude >= 5;
            if (filter === 'moderate') return q.magnitude >= 4 && q.magnitude < 5;
            if (filter === 'minor') return q.magnitude < 4;
            return true;
          });

          const totalEnergy = filtered.reduce((s, q) => s + q.energy, 0);
          const totalPower = filtered.reduce((s, q) => s + q.power, 0);
          const avgMag = filtered.length > 0 ? filtered.reduce((s, q) => s + q.magnitude, 0) / filtered.length : 0;
          const households = Math.floor(totalPower / 1200);

          const timeAgo = (date) => {
            const sec = Math.floor((new Date() - date) / 1000);
            if (sec < 60) return `${sec}s ago`;
            const min = Math.floor(sec / 60);
            if (min < 60) return `${min}m ago`;
            const hr = Math.floor(min / 60);
            if (hr < 24) return `${hr}h ago`;
            return `${Math.floor(hr / 24)}d ago`;
          };

          if (loading && earthquakes.length === 0) {
            return (
              <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 text-white p-8 flex items-center justify-center">
                <div className="text-center">
                  <Activity className="w-16 h-16 animate-pulse mx-auto mb-4" />
                  <p className="text-xl">Loading earthquake data...</p>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 text-white p-4 md:p-8">
              <div className="max-w-7xl mx-auto">
                <div className="mb-8">
                  <div className="flex items-center gap-3 mb-2">
                    <Activity className="w-10 h-10 text-blue-400" />
                    <h1 className="text-4xl font-bold">Global Earthquake Energy Monitor</h1>
                  </div>
                  <p className="text-slate-300">Real-time seismic activity with energy conversion analysis</p>
                </div>

                {error && (
                  <div className="bg-red-500/20 border border-red-500 rounded-lg p-4 mb-6 flex items-center gap-2">
                    <AlertTriangle className="w-5 h-5" />
                    <span>{error}</span>
                  </div>
                )}

                <div className="mb-6 flex gap-2 flex-wrap">
                  {['hour', 'day', 'week', 'month'].map(range => (
                    <button key={range} onClick={() => setTimeRange(range)} 
                      className={`px-4 py-2 rounded-lg transition-colors flex items-center gap-2 ${timeRange === range ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
                      <Calendar className="w-4 h-4" />
                      Past {range.charAt(0).toUpperCase() + range.slice(1)}
                    </button>
                  ))}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                  <div className="bg-slate-800/50 backdrop-blur rounded-xl p-6 border border-slate-700">
                    <div className="flex items-center gap-2 mb-2">
                      <Activity className="w-5 h-5 text-blue-400" />
                      <span className="text-slate-400">Total Events</span>
                    </div>
                    <p className="text-3xl font-bold">{filtered.length}</p>
                  </div>
                  
                  <div className="bg-slate-800/50 backdrop-blur rounded-xl p-6 border border-slate-700">
                    <div className="flex items-center gap-2 mb-2">
                      <Zap className="w-5 h-5 text-yellow-400" />
                      <span className="text-slate-400">Total Energy</span>
                    </div>
                    <p className="text-3xl font-bold">{formatEnergy(totalEnergy)}</p>
                  </div>

                  <div className="bg-slate-800/50 backdrop-blur rounded-xl p-6 border border-slate-700">
                    <div className="flex items-center gap-2 mb-2">
                      <TrendingUp className="w-5 h-5 text-green-400" />
                      <span className="text-slate-400">Avg Magnitude</span>
                    </div>
                    <p className="text-3xl font-bold">{avgMag.toFixed(2)}</p>
                  </div>

                  <div className="bg-slate-800/50 backdrop-blur rounded-xl p-6 border border-slate-700">
                    <div className="flex items-center gap-2 mb-2">
                      <AlertTriangle className="w-5 h-5 text-orange-400" />
                      <span className="text-slate-400">Strongest</span>
                    </div>
                    <p className="text-3xl font-bold">
                      {filtered.length > 0 ? Math.max(...filtered.map(q => q.magnitude)).toFixed(1) : '-'}
                    </p>
                  </div>
                </div>

                <div className="bg-gradient-to-r from-purple-900/30 to-blue-900/30 backdrop-blur rounded-xl p-6 border border-purple-700/50 mb-8">
                  <h3 className="font-semibold mb-4 flex items-center gap-2 text-lg">
                    <Zap className="w-6 h-6 text-yellow-400" />
                    Potential Energy Conversion Analysis
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <p className="text-slate-400 text-sm mb-1">Equivalent Power Output</p>
                      <p className="text-2xl font-bold text-yellow-400">{formatPower(totalPower)}</p>
                      <p className="text-xs text-slate-500 mt-1">if captured over 60 seconds</p>
                    </div>
                    <div>
                      <p className="text-slate-400 text-sm mb-1">Household Equivalent</p>
                      <p className="text-2xl font-bold text-green-400">{households.toLocaleString()}</p>
                      <p className="text-xs text-slate-500 mt-1">homes @ 1.2kW each for 1 hour</p>
                    </div>
                  </div>
                </div>

                <div className="mb-6 flex gap-2">
                  {[['all', 'All'], ['major', 'Major (5+)'], ['moderate', 'Moderate (4-5)'], ['minor', 'Minor (<4)']].map(([key, label]) => (
                    <button key={key} onClick={() => setFilter(key)} 
                      className={`px-4 py-2 rounded-lg ${filter === key ? 'bg-blue-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
                      {label}
                    </button>
                  ))}
                </div>

                <div className="bg-slate-800/50 backdrop-blur rounded-xl border border-slate-700 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead className="bg-slate-900/50">
                        <tr>
                          <th className="px-6 py-4 text-left text-sm font-semibold">Location</th>
                          <th className="px-6 py-4 text-left text-sm font-semibold">Magnitude</th>
                          <th className="px-6 py-4 text-left text-sm font-semibold">Energy</th>
                          <th className="px-6 py-4 text-left text-sm font-semibold">Power</th>
                          <th className="px-6 py-4 text-left text-sm font-semibold">Time</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-700">
                        {filtered.slice(0, 100).map(q => (
                          <tr key={q.id} className="hover:bg-slate-700/30">
                            <td className="px-6 py-4">
                              <div className="flex items-center gap-2">
                                <MapPin className="w-4 h-4 text-slate-400" />
                                <span className="text-sm">{q.place}</span>
                              </div>
                            </td>
                            <td className="px-6 py-4">
                              <span className={`inline-flex px-3 py-1 rounded-full ${getColor(q.magnitude)} font-bold`}>
                                {q.magnitude.toFixed(1)}
                              </span>
                            </td>
                            <td className="px-6 py-4 font-mono text-sm">{formatEnergy(q.energy)}</td>
                            <td className="px-6 py-4 font-mono text-sm">{formatPower(q.power)}</td>
                            <td className="px-6 py-4 text-sm">{timeAgo(q.time)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                <div className="mt-6 bg-slate-800/50 backdrop-blur rounded-xl p-6 border border-slate-700">
                  <h3 className="font-semibold mb-3 flex items-center gap-2">
                    <Zap className="w-5 h-5 text-yellow-400" />
                    How Energy Conversion Works
                  </h3>
                  <p className="text-sm text-slate-300">
                    Energy calculated using E = 10^(4.8 + 1.5M) joules. Power = Energy / 60 seconds. 
                    Note: This shows theoretical energy - current technology cannot capture seismic energy for electricity.
                  </p>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
